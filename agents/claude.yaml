interface:
  display_name: "Medical ML Leakage Guard"
  short_description: "Strict medical prediction leakage and lineage guard"
  default_prompt: "Run a publication-grade medical prediction review with strict request contract validation, signed execution-attestation verification (key policy, revocation list, trusted timestamp record, transparency log, execution-receipt proof, execution-log attestation, witness-quorum validation, and independent authority keys), TRIPOD+AI/PROBAST+AI/STARD-AI checklist validation, split-protocol verification, covariate-shift/separability audit, class-imbalance policy checks, missing-data/imputation policy checks (including MICE-with-scale-guard fallback evidence), hyperparameter-tuning leakage isolation, model-selection audit (PR-AUC objective, one-SE replay, no test usage), full clinical metric-panel consistency checks, generalization gap fail-closed checks, phenotype-definition and transitive lineage leakage checks, pinned metric-path consistency validation, evaluation-quality checks for primary-metric confidence intervals and baseline comparisons, permutation falsification, reproducibility comparison, and fail-closed evidence outputs."

provider:
  name: anthropic
  model: claude-sonnet-4-20250514
  api_base: "https://api.anthropic.com/v1"
  auth:
    type: api_key
    env_var: ANTHROPIC_API_KEY
  parameters:
    max_tokens: 8192
    temperature: 0.0
