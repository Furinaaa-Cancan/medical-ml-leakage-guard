name: ci-full

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  full-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt

      - name: Release benchmark suite (blocking)
        run: |
          python3 scripts/mlgg.py benchmark-suite \
            --profile release \
            --output /tmp/mlgg_release_benchmark_summary.ci_full.json \
            --artifacts-dir /tmp/mlgg_release_benchmark_runs \
            --emit-junit /tmp/mlgg_release_benchmark.junit.xml

      - name: Collect artifacts
        if: always()
        run: |
          mkdir -p /tmp/mlgg_ci_artifacts
          if [ -f /tmp/mlgg_release_benchmark_summary.ci_full.json ]; then
            cp /tmp/mlgg_release_benchmark_summary.ci_full.json /tmp/mlgg_ci_artifacts/
          fi
          if [ -f /tmp/mlgg_release_benchmark.junit.xml ]; then
            cp /tmp/mlgg_release_benchmark.junit.xml /tmp/mlgg_ci_artifacts/
          fi
          if [ -d /tmp/mlgg_release_benchmark_runs ]; then
            cp -R /tmp/mlgg_release_benchmark_runs /tmp/mlgg_ci_artifacts/
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-full-artifacts
          path: /tmp/mlgg_ci_artifacts
