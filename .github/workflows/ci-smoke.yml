name: ci-smoke

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt

      - name: CLI help sanity
        run: python3 scripts/mlgg.py --help

      - name: Onboarding smoke
        run: python3 scripts/test_onboarding_smoke.py

      - name: Split smoke
        run: python3 scripts/test_split_smoke.py

      - name: Gate smoke
        run: python3 scripts/test_gate_smoke.py
