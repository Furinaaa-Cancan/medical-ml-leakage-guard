name: ci-smoke

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt
          python3 -m pip install coverage

      - name: Installed package smoke
        run: |
          python3 -m venv /tmp/mlgg_pkgcheck
          /tmp/mlgg_pkgcheck/bin/python -m pip install --upgrade pip
          /tmp/mlgg_pkgcheck/bin/python -m pip install .
          /tmp/mlgg_pkgcheck/bin/python - <<'PY'
          import importlib.metadata as md
          import scipy

          names = {
              ep.name
              for ep in md.entry_points(group="console_scripts")
              if ep.name.startswith("mlgg")
          }
          required = {"mlgg", "mlgg-pixel"}
          missing = sorted(required - names)
          unexpected = sorted({"mlgg-web"} & names)
          if missing or unexpected:
              raise SystemExit(
                  f"unexpected installed entrypoints: missing={missing} unexpected={unexpected} all={sorted(names)}"
              )
          print("installed entrypoints:", sorted(names))
          print("scipy:", scipy.__version__)
          PY
          /tmp/mlgg_pkgcheck/bin/mlgg --help >/dev/null

      - name: Lint (ruff)
        run: |
          python3 -m pip install ruff
          ruff check scripts/

      - name: Type check (mypy)
        run: |
          python3 -m pip install mypy
          mypy scripts/_gate_utils.py scripts/split_data.py \
               scripts/_gate_framework.py scripts/_gate_registry.py \
               scripts/_security.py scripts/audit_external_project.py \
               scripts/generate_audit_report.py

      - name: CLI help sanity
        run: python3 scripts/mlgg.py --help

      - name: Onboarding smoke
        run: python3 -m coverage run --append scripts/test_onboarding_smoke.py

      - name: Split smoke
        run: python3 -m coverage run --append scripts/test_split_smoke.py

      - name: Play smoke
        run: python3 -m coverage run --append scripts/test_play_smoke.py

      - name: Gate smoke
        run: python3 -m coverage run --append scripts/test_gate_smoke.py

      - name: Unit tests (pytest – full suite)
        run: python3 -m coverage run --append -m pytest tests/ -v --tb=short -x

      - name: Interactive wizard tests (pty)
        if: runner.os != 'Windows'
        run: python3 -m coverage run --append tests/test_wizard_interactive.py

      - name: Coverage report
        if: always()
        run: |
          python3 -m coverage xml || true
          python3 -m coverage report --skip-empty || true

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: coverage.xml
